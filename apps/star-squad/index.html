<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Star Squad</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Star Squad">
<meta name="theme-color" content="#fdf3ea">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%23ffb9a3'/%3E%3Ctext x='90' y='128' font-size='110' text-anchor='middle'%3E%E2%AD%90%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=Baloo+2:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#fdf3ea;
    --bg2:#fbe7dd;
    --panel:#ffffff;
    --panel-soft:#fff6f0;
    --ink:#5b4a45;
    --ink-soft:#9b877f;
    --star:#f6b23f;
    --peach:#ffb9a3;
    --rose:#f7a1b4;
    --mint:#9bd6b8;
    --sky:#a8cdea;
    --lilac:#c9b6e6;
    --butter:#ffd98a;
    --line:#f0e2d8;
    --glow1:#fff5ec;
    --glow2:#fbe4ec;
    --tile-peach:#ffcdbb;
    --tile-rose:#f9c1cf;
    --tile-mint:#bfe6d0;
    --tile-sky:#c4ddf1;
    --tile-lilac:#ddccf0;
    --tile-butter:#ffe6ad;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:"Quicksand","Trebuchet MS",system-ui,sans-serif;
    background:
      radial-gradient(90% 60% at 15% 0%, var(--glow1) 0%, transparent 60%),
      radial-gradient(80% 60% at 100% 10%, var(--glow2) 0%, transparent 55%),
      var(--bg);
    transition:background-color .4s;
    color:var(--ink);
    overflow-x:hidden;
    -webkit-font-smoothing:antialiased;
    padding-bottom:env(safe-area-inset-bottom);
  }
  .clouds{position:fixed;inset:0;pointer-events:none;z-index:0}
  .clouds i{position:absolute;font-size:26px;opacity:.5;animation:drift 26s linear infinite}
  @keyframes drift{from{transform:translateX(-12vw)}to{transform:translateX(112vw)}}

  .wrap{position:relative;z-index:1;max-width:560px;margin:0 auto;padding:20px 16px 44px}

  header{text-align:center;margin:4px 0 18px}
  .title{
    font-family:"Baloo 2",inherit;font-size:34px;font-weight:800;letter-spacing:.3px;color:var(--ink);
  }
  .title .s{color:var(--star)}
  .subtitle{font-size:14px;color:var(--ink-soft);margin-top:2px;font-weight:600}
  .revtag{font-size:10.5px;color:var(--ink-soft);opacity:.6;margin-top:4px;font-weight:600;letter-spacing:.3px}

  /* scoreboard */
  .board{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:14px}
  .kid{
    border-radius:26px;padding:16px 14px 16px;position:relative;overflow:hidden;
    background:var(--panel);border:3px solid var(--line);
    box-shadow:0 8px 20px rgba(180,120,90,.10);
    transition:transform .18s,border-color .2s,box-shadow .2s;cursor:pointer;text-align:center;
  }
  .kid.active{border-color:var(--peach);transform:translateY(-3px);box-shadow:0 12px 26px rgba(255,150,120,.22)}
  .kid .avatar{font-size:46px;line-height:1;filter:drop-shadow(0 3px 3px rgba(0,0,0,.12))}
  .kid .name{font-family:"Baloo 2",inherit;font-size:19px;font-weight:800;margin-top:2px}
  .kid .pts{font-family:"Baloo 2",inherit;font-size:30px;font-weight:800;color:var(--star);line-height:1.15}
  .kid .pts small{font-size:13px;color:var(--ink-soft);font-weight:700}
  .kid .lead{position:absolute;top:10px;right:12px;font-size:22px;opacity:0;transition:opacity .3s}
  .kid.winning .lead{opacity:1;animation:bob 1.4s infinite ease-in-out}
  @keyframes bob{0%,100%{transform:translateY(0) rotate(-6deg)}50%{transform:translateY(-4px) rotate(6deg)}}
  .kid .barwrap{height:14px;background:var(--bg2);border-radius:99px;margin-top:12px;overflow:hidden}
  .kid .bar{height:100%;width:0;border-radius:99px;transition:width .6s cubic-bezier(.2,.9,.3,1)}
  .kid .goaltxt{font-size:11.5px;color:var(--ink-soft);margin-top:7px;font-weight:600}
  .kid .bank{position:absolute;top:10px;left:12px;background:var(--panel-soft);border:2px solid var(--butter);border-radius:99px;padding:4px 10px;font-family:"Baloo 2",inherit;font-size:11.5px;font-weight:800;color:#8a6a2f;cursor:pointer;display:flex;align-items:center;gap:3px;z-index:2}
  .kid .bank:active{transform:scale(.94)}
  .kid .bank.empty{opacity:.55;cursor:default}
  .kid .selectzone{cursor:pointer}
  .kid .petzone{height:66px;display:flex;align-items:flex-end;justify-content:center;margin-top:14px;padding-top:10px;border-top:2px solid var(--line)}
  .kid .pet{line-height:1;filter:drop-shadow(0 4px 4px rgba(0,0,0,.15));transition:font-size .6s cubic-bezier(.2,.9,.3,1);cursor:pointer;animation:petIdle 2.8s ease-in-out infinite;transform-origin:bottom center}
  .kid .pet:active{transform:scale(.9)}
  .kid .petstage{font-size:11px;color:var(--ink-soft);font-weight:700;margin-top:4px}
  .petgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:14px}
  .petopt{background:var(--panel-soft);border:2px solid var(--line);border-radius:16px;padding:12px 6px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:5px;font-family:inherit}
  .petopt .pe{font-size:38px;line-height:1}
  .petopt .pl{font-family:"Baloo 2",inherit;font-size:12px;font-weight:700;color:var(--ink)}
  .petopt.sel{border-color:var(--peach);background:#fff;box-shadow:0 0 0 3px rgba(255,185,163,.35)}

  .whoseturn{text-align:center;font-size:14px;font-weight:700;margin:2px 0 16px;color:var(--ink-soft)}
  .whoseturn b{color:var(--peach)}

  /* task grid */
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  @media(min-width:460px){.grid{grid-template-columns:1fr 1fr 1fr}}
  .task{
    border:3px solid rgba(255,255,255,.6);border-radius:28px;padding:16px 10px 14px;color:var(--ink);
    font-family:inherit;font-weight:700;font-size:15px;cursor:pointer;position:relative;
    box-shadow:0 6px 14px rgba(180,120,90,.14);transition:transform .1s,box-shadow .1s,filter .25s;
    display:flex;flex-direction:column;align-items:center;gap:7px;min-height:120px;justify-content:center;
  }
  .task:active{transform:translateY(3px) scale(.99);box-shadow:0 3px 8px rgba(180,120,90,.14)}
  .task .emoji{font-size:48px;line-height:1;filter:drop-shadow(0 2px 2px rgba(0,0,0,.1))}
  .task .lbl{font-family:"Baloo 2",inherit;font-weight:700}
  .task .val{position:absolute;top:9px;right:12px;font-size:13px;font-weight:800;background:rgba(255,255,255,.55);padding:2px 9px;border-radius:99px;color:var(--ink)}
  .task .cnt{position:absolute;top:9px;left:12px;font-size:13px;font-weight:800;background:var(--ink);color:#fff;padding:2px 9px;border-radius:99px;animation:pop .35s}
  .task.done{filter:saturate(.55) brightness(.99)}
  .task.done::after{content:"✓";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:56px;color:#fff;text-shadow:0 3px 6px rgba(120,90,70,.35);animation:pop .45s}
  @keyframes pop{0%{transform:scale(0)}70%{transform:scale(1.2)}100%{transform:scale(1)}}
  .c-peach{background:var(--tile-peach)} .c-rose{background:var(--tile-rose)} .c-mint{background:var(--tile-mint)}
  .c-sky{background:var(--tile-sky)} .c-lilac{background:var(--tile-lilac)} .c-butter{background:var(--tile-butter)}

  /* chill vibe: calmer motion + softer shapes */
  body.chill .kid{border-radius:18px;transition:border-color .2s,box-shadow .2s}
  body.chill .kid.active{transform:none;box-shadow:0 8px 20px rgba(180,120,90,.10)}
  body.chill .kid.winning .lead{animation:none}
  body.chill .pet{animation:none}
  body.chill .task{border-radius:18px}
  body.chill .task:active{transform:none;box-shadow:0 6px 14px rgba(180,120,90,.14)}
  body.chill .prize.ready{animation:none}
  body.chill .clouds i{animation-duration:52s}

  /* prize row */
  .prizebar{margin-top:22px;background:var(--panel);border-radius:26px;padding:18px;box-shadow:0 8px 20px rgba(180,120,90,.10);border:3px solid var(--line)}
  .prizebar h2{font-family:"Baloo 2",inherit;font-size:17px;margin-bottom:14px;text-align:center;color:var(--ink)}
  .prizes{display:flex;gap:12px;overflow-x:auto;padding-bottom:6px}
  .prize{
    min-width:100px;flex-shrink:0;background:var(--panel-soft);border-radius:22px;padding:14px 8px;text-align:center;
    border:3px solid var(--line);transition:border-color .2s,transform .15s,box-shadow .2s;
  }
  .prize.ready{border-color:var(--mint);animation:glow 1.8s infinite}
  @keyframes glow{0%,100%{box-shadow:0 0 0 rgba(155,214,184,0)}50%{box-shadow:0 0 18px rgba(155,214,184,.7)}}
  .prize .pe{font-size:36px}
  .prize .pn{font-family:"Baloo 2",inherit;font-size:12.5px;font-weight:700;margin:5px 0;color:var(--ink)}
  .prize .pc{font-family:"Baloo 2",inherit;font-size:13px;font-weight:800;color:var(--star)}
  .prize .redeem{margin-top:7px;font-family:"Baloo 2",inherit;font-size:11.5px;font-weight:800;background:var(--mint);color:#2f5a45;border:none;border-radius:99px;padding:5px 12px;cursor:pointer;opacity:.4;pointer-events:none}
  .prize.ready .redeem{opacity:1;pointer-events:auto}

  /* controls */
  .footer{margin-top:24px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
  .btn{background:var(--panel);border:2px solid var(--line);color:var(--ink);font-family:inherit;font-weight:700;font-size:13px;padding:10px 16px;border-radius:99px;cursor:pointer;box-shadow:0 3px 8px rgba(180,120,90,.08)}
  .btn:active{transform:scale(.96)}

  /* celebration overlay */
  .cheer{position:fixed;inset:0;z-index:50;display:none;align-items:center;justify-content:center;pointer-events:none}
  .cheer.show{display:flex}
  .cheer .msg{font-family:"Baloo 2",inherit;font-size:60px;font-weight:800;color:#fff;text-shadow:0 4px 0 rgba(247,161,180,.65),0 8px 18px rgba(0,0,0,.15);animation:cheerpop .8s ease}
  @keyframes cheerpop{0%{transform:scale(0) rotate(-12deg);opacity:0}40%{transform:scale(1.25) rotate(4deg);opacity:1}100%{transform:scale(1) rotate(0)}}
  canvas#confetti{position:fixed;inset:0;z-index:49;pointer-events:none}

  /* parent modal */
  .modal{position:fixed;inset:0;background:rgba(91,74,69,.5);backdrop-filter:blur(3px);z-index:60;display:none;align-items:center;justify-content:center;padding:20px}
  .modal.show{display:flex}
  .card{background:var(--panel);border-radius:26px;padding:24px;max-width:380px;width:100%;max-height:86vh;overflow:auto;box-shadow:0 20px 50px rgba(120,90,70,.3)}
  .card h3{font-family:"Baloo 2",inherit;margin-bottom:8px;font-size:21px;color:var(--ink)}
  .card .hint{font-size:12px;color:var(--ink-soft);margin-bottom:8px}
  .card label{display:block;font-size:12.5px;color:var(--ink-soft);margin:12px 0 4px;font-weight:700}
  .card input{width:100%;padding:11px 13px;border-radius:14px;border:2px solid var(--line);background:var(--panel-soft);color:var(--ink);font-family:inherit;font-size:15px;font-weight:600}
  .kidedit{background:var(--panel-soft);border:2px solid var(--line);border-radius:18px;padding:12px 14px;margin-top:12px;position:relative}
  .kidedit .kidhead{display:flex;align-items:center;justify-content:space-between}
  .kidedit .kidhead b{font-family:"Baloo 2",inherit;font-size:14px}
  .card .row{display:flex;gap:10px;margin-top:20px}
  .card .row .btn{flex:1;border-color:transparent;background:var(--peach);color:#7a463a;font-weight:800}
  .card .row .btn.ghost{background:var(--panel);border:2px solid var(--line);color:var(--ink)}
  .miniadd{width:100%;margin-top:12px;border-color:var(--mint);color:#2f6a4d;background:var(--panel)}
  .lock{position:fixed;bottom:16px;right:16px;z-index:40;width:50px;height:50px;border-radius:50%;background:var(--panel);border:2px solid var(--line);color:var(--ink);font-size:22px;cursor:pointer;box-shadow:0 6px 16px rgba(180,120,90,.2)}
  .tweaksbtn{position:fixed;bottom:16px;left:16px;z-index:40;width:50px;height:50px;border-radius:50%;background:var(--panel);border:2px solid var(--line);color:var(--ink);font-size:22px;cursor:pointer;box-shadow:0 6px 16px rgba(180,120,90,.2)}
  .tweaksbtn:active{transform:scale(.94)}
  .swatchrow{display:flex;gap:10px;margin-top:8px}
  .swatch{flex:1;border-radius:16px;border:2px solid var(--line);padding:10px 6px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px;background:var(--panel-soft);font-family:inherit}
  .swatch .dots{display:flex;gap:3px}
  .swatch .dot{width:14px;height:14px;border-radius:50%}
  .swatch .sl{font-family:"Baloo 2",inherit;font-size:11px;font-weight:700;color:var(--ink)}
  .swatch.sel{border-color:var(--peach);box-shadow:0 0 0 3px rgba(255,185,163,.3);background:#fff}
  .seg{display:flex;gap:8px;margin-top:8px}
  .seg button{flex:1;padding:10px 8px;border-radius:14px;border:2px solid var(--line);background:var(--panel-soft);font-family:"Baloo 2",inherit;font-weight:700;font-size:12.5px;color:var(--ink);cursor:pointer}
  .seg button.sel{border-color:var(--peach);background:#fff;box-shadow:0 0 0 3px rgba(255,185,163,.3)}
  .seg button:active{transform:scale(.96)}
  .toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-16px);background:var(--panel);border:2px solid var(--mint);border-radius:99px;padding:9px 20px;font-family:"Baloo 2",inherit;font-weight:800;font-size:14px;color:#2f6a4d;box-shadow:0 8px 20px rgba(180,120,90,.15);z-index:55;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  @keyframes petIdle{0%,100%{transform:translateY(0) rotate(-2deg) scale(1)}50%{transform:translateY(-5px) rotate(2deg) scale(1.03)}}
  @keyframes petPop{0%{transform:translateY(0) scale(1)}35%{transform:translateY(-14px) scale(1.35) rotate(-6deg)}70%{transform:translateY(2px) scale(.94)}100%{transform:translateY(0) scale(1)}}
  @keyframes petShake{0%,100%{transform:translateX(0) rotate(0)}20%{transform:translateX(-6px) rotate(-7deg)}40%{transform:translateX(5px) rotate(6deg)}60%{transform:translateX(-4px) rotate(-4deg)}80%{transform:translateX(3px) rotate(3deg)}}
</style>
</head>
<body>
<div class="clouds" id="clouds"></div>

<div class="wrap">
  <header>
    <div class="title"><span class="s">⭐</span> Star Squad <span class="s">⭐</span></div>
    <div class="subtitle">Tap what you did. Earn stars. Win prizes!</div>
    <div class="revtag" id="revtag"></div>
  </header>

  <div class="board" id="board"></div>
  <div class="whoseturn" id="turn"></div>

  <div class="grid" id="grid"></div>

  <div class="prizebar">
    <h2>🎁 Prize Shop</h2>
    <div class="prizes" id="prizes"></div>
  </div>

  <div class="footer">
    <button class="btn" onclick="resetDay()">🔄 New Day</button>
    <button class="btn" onclick="openParent()">🔒 Grown-Up Settings</button>
    <button class="btn" onclick="backupData()">💾 Backup</button>
    <button class="btn" onclick="document.getElementById('restoreFile').click()">📂 Restore</button>
    <input type="file" id="restoreFile" accept="application/json,.json" style="display:none" onchange="restoreData(event)">
  </div>
</div>

<button class="lock" onclick="openParent()" title="Grown-up settings">⚙️</button>
<button class="tweaksbtn" onclick="openTweaks()" title="Tweaks">🎛️</button>

<div class="cheer" id="cheer"><div class="msg" id="cheerMsg">YAY!</div></div>
<canvas id="confetti"></canvas>

<!-- Parent modal -->
<div class="modal" id="modal">
  <div class="card">
    <h3>Grown-Up Settings 🔒</h3>
    <div class="hint">Names &amp; changes save only on this device.</div>
    <div id="parentBody"></div>
    <div class="row">
      <button class="btn ghost" onclick="closeParent()">Close</button>
      <button class="btn" onclick="saveParent()">Save</button>
    </div>
  </div>
</div>

<!-- Pet picker modal -->
<div class="modal" id="petModal">
  <div class="card" style="max-width:340px">
    <h3>Choose a Pet 🐾</h3>
    <div class="hint">Earn stars to help your pet grow all the way up!</div>
    <div class="petgrid" id="petGrid"></div>
    <div class="row"><button class="btn ghost" onclick="closePet()">Done</button></div>
  </div>
</div>

<!-- Tweaks modal -->
<div class="modal" id="tweaksModal">
  <div class="card" style="max-width:360px">
    <h3>Tweaks 🎛️</h3>
    <div class="hint">Change the whole feel of Star Squad.</div>
    <label>Color Mood</label>
    <div class="swatchrow" id="themeRow"></div>
    <label>Energy</label>
    <div class="seg" id="vibeRow"></div>
    <label>Celebrations</label>
    <div class="seg" id="celebRow"></div>
    <div class="row"><button class="btn ghost" onclick="closeTweaks()">Done</button></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ---------- version ---------- */
const REV = 5; // bump this on every shipped update
const REV_DATE = "2026-07-09";

/* ---------- data ---------- */
const TILE = ["c-peach","c-butter","c-mint","c-rose","c-lilac","c-sky"];
const PETS = [
  {key:"puppy",  name:"Puppy",     stages:["🐶","🐕"]},
  {key:"kitten", name:"Kitten",    stages:["🐱","🐈"]},
  {key:"bfly",   name:"Butterfly", stages:["🐛","🐛","🦋"]},
  {key:"chick",  name:"Chicken",   stages:["🥚","🐣","🐥","🐔"]},
  {key:"avocado",name:"Avocado",   stages:["🥑","🌱","🌳"]},
  {key:"tree",   name:"Tree",      stages:["🌱","🌿","🌳"]}
];
function petLabel(r){ if(r>=1)return "All grown! 🎉"; if(r>=.75)return "Almost grown!"; if(r>=.5)return "Getting big!"; if(r>=.25)return "Growing…"; if(r>0)return "Tiny baby"; return "Baby — earn stars!"; }
function petFor(k,i,ratio){
  const p = PETS.find(x=>x.key===k.pet) || PETS[i%PETS.length];
  const si = Math.max(0, Math.min(p.stages.length-1, Math.floor(ratio*p.stages.length)));
  const size = Math.round(30 + Math.min(1,ratio)*46);
  return {emoji:p.stages[si], size, label:petLabel(ratio)};
}
const BAR_SETS = {
  peach:[
    "linear-gradient(90deg,#ffb9a3,#ffd98a)",
    "linear-gradient(90deg,#f7a1b4,#c9b6e6)",
    "linear-gradient(90deg,#9bd6b8,#a8cdea)",
    "linear-gradient(90deg,#a8cdea,#9bd6b8)",
    "linear-gradient(90deg,#c9b6e6,#f7a1b4)",
    "linear-gradient(90deg,#ffd98a,#ffb9a3)"
  ],
  ocean:[
    "linear-gradient(90deg,#7fc4c9,#ffdf9e)",
    "linear-gradient(90deg,#8fb8d9,#a9c9e8)",
    "linear-gradient(90deg,#8fd6c2,#7ec8e3)",
    "linear-gradient(90deg,#7ec8e3,#8fd6c2)",
    "linear-gradient(90deg,#a9c9e8,#8fb8d9)",
    "linear-gradient(90deg,#ffdf9e,#7fc4c9)"
  ],
  berry:[
    "linear-gradient(90deg,#ff8fab,#ffd166)",
    "linear-gradient(90deg,#ff6f9c,#e29be0)",
    "linear-gradient(90deg,#c99bea,#b98ee0)",
    "linear-gradient(90deg,#b98ee0,#c99bea)",
    "linear-gradient(90deg,#e29be0,#ff6f9c)",
    "linear-gradient(90deg,#ffd166,#ff8fab)"
  ]
};
const THEMES = {
  peach:{ label:"Peach Cozy", dots:["#ffb9a3","#9bd6b8","#c9b6e6"], confetti:["#ffb9a3","#f7a1b4","#9bd6b8","#a8cdea","#c9b6e6","#ffd98a"], vars:{
    "--bg":"#fdf3ea","--bg2":"#fbe7dd","--panel-soft":"#fff6f0","--glow1":"#fff5ec","--glow2":"#fbe4ec",
    "--peach":"#ffb9a3","--rose":"#f7a1b4","--mint":"#9bd6b8","--sky":"#a8cdea","--lilac":"#c9b6e6","--butter":"#ffd98a","--line":"#f0e2d8","--star":"#f6b23f",
    "--tile-peach":"#ffcdbb","--tile-rose":"#f9c1cf","--tile-mint":"#bfe6d0","--tile-sky":"#c4ddf1","--tile-lilac":"#ddccf0","--tile-butter":"#ffe6ad"
  }},
  ocean:{ label:"Ocean Calm", dots:["#7fc4c9","#8fb8d9","#ffdf9e"], confetti:["#7fc4c9","#8fb8d9","#8fd6c2","#7ec8e3","#a9c9e8","#ffdf9e"], vars:{

let S = load();

function load(){
  try{
    const d = JSON.parse(localStorage.getItem("starSquad"));
    if(d&&d.kids&&d.kids.length){
      d.kids.forEach(k=>{ if(typeof k.today!=="number") k.today=0; if(typeof k.bank!=="number") k.bank=0; });
      if(!d.tweaks) d.tweaks={theme:"peach", vibe:"playful", celebration:"big"};
      return d;
    }
  }catch(e){}
  return JSON.parse(JSON.stringify(DEFAULT));
}
function applyTheme(key){
  const t = THEMES[key] || THEMES.peach;
  Object.entries(t.vars).forEach(([k,v])=>document.documentElement.style.setProperty(k,v));
  barGrads = BAR_SETS[key] || BAR_SETS.peach;
  confettiColors = t.confetti;
}
function applyVibe(v){ document.body.classList.toggle("chill", v==="chill"); }
function save(){ try{localStorage.setItem("starSquad",JSON.stringify(S))}catch(e){} }
function clampActive(){ if(active>=S.kids.length) active=S.kids.length-1; if(active<0) active=0; }

/* ---------- render ---------- */
function render(){
  clampActive();
  const board = document.getElementById("board");
  const points = S.kids.map(k=>k.points);
  const max = Math.max(...points);
  const leaders = points.filter(p=>p===max).length;
  board.innerHTML = S.kids.map((k,i)=>{
    const pct = Math.min(100, Math.round(k.points/(k.goal||1)*100));
    const winning = k.points===max && max>0 && leaders===1;
    const bar = barGrads[i % barGrads.length];
    const ratio = Math.min(1.15, k.points/(k.goal||1));
    const pet = petFor(k,i,ratio);
    return `<div class="kid ${i===active?'active':''} ${winning?'winning':''}">
      <div class="lead">👑</div>
      <div class="bank ${k.points<=0?'empty':''}" onclick="event.stopPropagation();bankIt(${i})" title="Tap to bank your ${k.points} unspent stars">🏦 ${k.bank||0}</div>
      <div class="selectzone" onclick="setActive(${i})">
        <div class="avatar">${esc(k.avatar)}</div>
        <div class="name">${esc(k.name)}</div>
        <div class="pts">${k.points}<small> / ${k.goal} ⭐</small></div>
        <div class="barwrap"><div class="bar" style="width:${pct}%;background:${bar}"></div></div>
        <div class="goaltxt">${k.goal-k.points>0?(k.goal-k.points)+" to go!":"Goal smashed! 🎉"}</div>
      </div>
      <div class="petzone"><span class="pet" style="font-size:${pet.size}px" onclick="event.stopPropagation();openPet(${i})" title="Tap to choose a pet">${pet.emoji}</span></div>
      <div class="petstage">${pet.label} · tap to change</div>
    </div>`;
  }).join("");

  document.getElementById("turn").innerHTML =
    `Tapping for: <b>${esc(S.kids[active].avatar)} ${esc(S.kids[active].name)}</b>${S.kids.length>1?" (tap another name to switch)":""}`;

  const counts = S.kids[active].counts || {};
  document.getElementById("grid").innerHTML = S.tasks.map((t,i)=>{
    const cnt = counts[i]||0;
    return `
    <button class="task ${TILE[i % TILE.length]}" onclick="doTask(${i})">
      <span class="val">+${t.val}</span>
      ${cnt>0?`<span class="cnt">×${cnt}</span>`:``}
      <span class="emoji">${esc(t.emoji)}</span>
      <span class="lbl">${esc(t.label)}</span>
    </button>`;
  }).join("");

  const pts = S.kids[active].points + (S.kids[active].bank||0);
  document.getElementById("prizes").innerHTML = S.prizes.map((p,i)=>`
    <div class="prize ${pts>=p.cost?'ready':''}">
      <div class="pe">${esc(p.emoji)}</div>
      <div class="pn">${esc(p.name)}</div>
      <div class="pc">${p.cost} ⭐</div>
      <button class="redeem" onclick="redeem(${i})">Get it!</button>
    </div>`).join("");

  save();
}
function esc(s){return String(s).replace(/[<>&"']/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'}[c]))}

function setActive(i){ active=i; render(); }

function petAnim(anim){
  const p=document.querySelector('.kid.active .pet');
  if(!p)return;
  p.style.animation='none'; void p.offsetWidth;
  p.style.animation=anim;
  p.addEventListener('animationend',()=>{p.style.animation='';},{once:true});
}

/* ---------- actions ---------- */
const CHEERS=["YAY!","AWESOME!","WOOHOO!","SUPERSTAR!","NICE!","AMAZING!","GO YOU!","HIGH FIVE!"];
function doTask(i){
  const k = S.kids[active];
  k.counts = k.counts || {};
  k.counts[i] = (k.counts[i]||0)+1;
  k.points += S.tasks[i].val;
  feedback(CHEERS[Math.floor(Math.random()*CHEERS.length)]);
  render();
  petAnim('petPop .6s ease');
}
function redeem(i){
  const p = S.prizes[i], k = S.kids[active];
  const total = k.points + (k.bank||0);
  if(total < p.cost) return;
  let remaining = p.cost;
  const fromPoints = Math.min(k.points, remaining);
  k.points -= fromPoints;
  remaining -= fromPoints;
  k.bank = (k.bank||0) - remaining;
  feedback(p.emoji+" "+p.name.toUpperCase()+"!", true);
  render();
  petAnim('petShake .5s ease');
}
function bankIt(i){
  const k = S.kids[i];
  if(k.points<=0) return;
  k.bank = (k.bank||0) + k.points;
  k.points = 0;
  save(); render();
  feedback("BANKED! 🏦");
}
function resetDay(){
  S.kids.forEach(k=>{k.done=[];k.counts={};k.points=0;});
  render();
  celebrate("NEW DAY!");
}

/* ---------- celebration ---------- */
function feedback(msg, big){
  if(S.tweaks && S.tweaks.celebration==="quiet"){ quietToast(msg); return; }
  celebrate(msg);
  ding(big);
}
function quietToast(msg){
  const t=document.getElementById("toast");
  t.textContent = "✨ "+msg;
  t.classList.add("show");
  clearTimeout(quietToast._t);
  quietToast._t = setTimeout(()=>t.classList.remove("show"),1100);
}
function celebrate(msg){
  const c=document.getElementById("cheer");
  document.getElementById("cheerMsg").textContent=msg;
  c.classList.add("show");
  fireConfetti();
  setTimeout(()=>c.classList.remove("show"),1100);
}

const cv=document.getElementById("confetti"), ctx=cv.getContext("2d");
let bits=[];
function sizeCv(){cv.width=innerWidth;cv.height=innerHeight}
sizeCv(); addEventListener("resize",sizeCv);
function fireConfetti(){
  for(let i=0;i<90;i++){
    bits.push({x:innerWidth/2,y:innerHeight/2,
      vx:(Math.random()-.5)*15,vy:(Math.random()-.5)*15-4,
      s:6+Math.random()*8,c:confettiColors[i%confettiColors.length],
      rot:Math.random()*6,vr:(Math.random()-.5)*.4,life:72});
  }
  if(!raf) loop();
}
let raf=null;
function loop(){
  ctx.clearRect(0,0,cv.width,cv.height);
  bits.forEach(b=>{
    b.vy+=.38;b.x+=b.vx;b.y+=b.vy;b.rot+=b.vr;b.life--;
    ctx.save();ctx.translate(b.x,b.y);ctx.rotate(b.rot);
    ctx.fillStyle=b.c;
    ctx.beginPath();ctx.roundRect(-b.s/2,-b.s/2,b.s,b.s*.62,2);ctx.fill();
    ctx.restore();
  });
  bits=bits.filter(b=>b.life>0 && b.y<cv.height+40);
  if(bits.length){raf=requestAnimationFrame(loop)}
  else{ctx.clearRect(0,0,cv.width,cv.height);raf=null}
}

/* sound */
let ac;
function ding(big){
  try{
    ac=ac||new (window.AudioContext||window.webkitAudioContext)();
    const notes= big?[523,659,784,1047]:[659,880];
    notes.forEach((f,i)=>{
      const o=ac.createOscillator(),g=ac.createGain();
      o.type="sine";o.frequency.value=f;
      o.connect(g);g.connect(ac.destination);
      const t=ac.currentTime+i*0.09;
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(.22,t+0.02);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.3);
      o.start(t);o.stop(t+0.32);
    });
  }catch(e){}
}

/* ---------- backup / restore ---------- */
function backupData(){
  const blob=new Blob([JSON.stringify(S,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url; a.download="star-squad-backup.json";
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
  celebrate("SAVED! 💾");
}
function restoreData(e){
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=()=>{
    try{
      const d=JSON.parse(r.result);
      if(d&&d.kids&&d.tasks&&d.prizes){
        S=d; active=0;
        if(!S.tweaks) S.tweaks={theme:"peach", vibe:"playful", celebration:"big"};
        applyTheme(S.tweaks.theme); applyVibe(S.tweaks.vibe);
        save(); render(); celebrate("RESTORED! 📂");
      }
      else alert("That file doesn't look like a Star Squad backup.");
    }catch(err){ alert("Couldn't read that backup file."); }
  };
  r.readAsText(f);
  e.target.value="";
}
